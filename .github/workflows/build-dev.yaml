name: ADF Dev pipeline

on:
  push:
    branches:
      - dev

run-name: ${{ inputs.Platform }} Build-${{ github.sha.substring(0, 7) }}

permissions:
  id-token: write
  contents: read
  
jobs:
  Build:
    runs-on: ubuntu-latest
    outputs:
      folders: ${{ steps.folders.outputs.folders }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 2

    - name: Identify changed folders under 'FIG'
      id: folders
      run: |
        mkdir dev-artifacts
        CHANGED_FOLDERS=$(git diff --name-only HEAD HEAD~1 |  grep 'Azure Data Factory/FIG/' | cut -d '/' -f3 | sort | uniq)
        FOLDERS_ARRAY=$(echo "$CHANGED_FOLDERS" | tr '\n' '\n' | sed 's/^\(.*\)$/\"&\"/g' | tr '\n' ', ' | sed 's/,$//;s/^/folders=[/;s/$/]/')
        
        while IFS= read -r line; do
          cp "Azure Data Factory/FIG/$line/" "dev-artifacts/" -r
        done <<< "$CHANGED_FOLDERS"
        cp "Azure Data Factory/FIG/integrationRuntime/" "dev-artifacts/" -r

        echo $FOLDERS_ARRAY >> "$GITHUB_OUTPUT"
        cat $GITHUB_OUTPUT

    - name: Build 
      uses: actions/upload-artifact@v4
      if: ${{ steps.folders.outputs.folders != '[""]'}}
      with:
          name: build-${{ github.run_number }}
          path: |
            dev-artifacts/**

  Dev:
    runs-on: ubuntu-latest
    if: ${{ needs.Build.outputs.folders != '[""]'}}
    needs: Build
    strategy:
      matrix:
        folder: ${{ fromJSON(needs.Build.outputs.folders) }}
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.run_number }}
      - name: Define Folder
        run: |
          echo ${{ matrix.folder }}
          tree
          cd "${{ matrix.folder }}"
          ls
