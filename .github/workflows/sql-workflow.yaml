name: SQL Build & Release
on:
  push:
    branches:
      - sql-proj

run-name: SQL Build & Release-${{ github.run_number }}

permissions:
  id-token: write
  contents: read
  
jobs:
  Build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2
    
    - name: Build Customer
      run: |
        msbuild Customer/Customer.sqlproj /p:Configuration=Release

    
    - name: Build Sales
      run: |
        msbuild Sales/Sales.sqlproj  /p:Configuration=Release

    - run: ls

    - name: Build 
      uses: actions/upload-artifact@v4
      with:
          name: customer-build-${{ github.run_number }}
          path: |
            Customer/bin

    - name: Build 
      uses: actions/upload-artifact@v4
      with:
          name: sales-build-${{ github.run_number }}
          path: |
            Sales/bin
    

  DEV:
    runs-on: ubuntu-latest
    needs: [Build]
    steps:
    - name: Download Artifact
      uses: actions/download-artifact@v4

    - run: ls