name: SQL Build & Release
on:
  push:
    branches:
      - sql-proj

run-name: SQL Build & Release-${{ github.run_number }}

permissions:
  id-token: write
  contents: read
  
jobs:
  Build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2

    - run: dotnet tool install -g microsoft.sqlpackage
    

    - name: Build Customer
      run: |
        msbuild Customer/Customer.sqlproj /p:Configuration=Release

    
