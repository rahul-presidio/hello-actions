name: 'Copy Files to Windows'
description: 'Copy Files to Windows Machines using Robocopy'
inputs:
  Source: 
    description: 'Absolute path of the source folder or file on the local machine, or a UNC Share'
    required: true
  Machines: 
    description: 'Provide a comma separated list of machine IP addresses or FQDNs'
    required: true
  Admin_Login: 
    description: 'Administrator login for the target machines'
    required: true
  Password: 
    description: 'Password for administrator login for the target machines'
    required: true
  Destination_Folder: 
    description: 'Local Path on the target machines or an accessible UNC path for copying the files from the source'
    required: true
runs:
  using: "composite"
  steps:
  - name: Copy Files
    shell: powershell
    run: |
      function Get-DestinationNetworkPath([string]$targetPath,[string]$machineShare)
      { if(-not $machineShare){ return $targetPath}
      $targetSpecificPath = Replace-First $targetPath ":" '$'    
      return [io.path]::Combine($machineShare, $targetSpecificPath) }   

      function Get-MachineShare([string]$fqdn,[string]$targetPath)
      { if([bool]([uri]$targetPath).IsUnc){ return $targetPath }
          if($fqdn){return [IO.Path]::DirectorySeparatorChar + [IO.Path]::DirectorySeparatorChar + $fqdn }
      return "" }

      function Replace-First([string]$text,[string]$search,[string]$replace )
      {$pos = $text.IndexOf($search);
      if ($pos -le 0){return $text; }
      return $text.Substring(0, $pos) + $replace + $text.Substring($pos + $search.Length); }

      function Create-DestinationDirectory(
        [string]$path
      )
      {
          $destPath = $path
          $foundParentPath = $false
          $isRoot = $false

          Write-Verbose "Creating path to directory: $path"
          while($destPath -and (-not $foundParentPath))
          {
              try
              {
                  New-PSDrive -Name WFCPSDrive -PSProvider FileSystem -Root $destPath -Credential $psCredentialObject -ErrorAction 'Stop'
                  $foundParentPath = $true
                  Write-Verbose "Found parent path"
                  $relativePath = $path.Substring($destPath.Length)
                  New-Item -ItemType Directory WFCPSDrive:$relativePath -ErrorAction 'Stop' -Force
                  Write-Verbose "Created directory"
              }
              catch 
              {
                  Write-Verbose "Caught exception: $_.Exception.Message"
                  $parentPath = Split-Path -Path $destPath -Parent
                  if(($parentPath.Length -eq 0) -and ($isRoot -eq $false))
                  {
                      $destPath = [IO.Path]::DirectorySeparatorChar + [IO.Path]::DirectorySeparatorChar + ([System.Uri]($destPath)).Host
                      $isRoot = $true
                      Write-Verbose "Check if root path exists: $destPath"
                  }
                  else
                  {
                      $destPath = $parentPath
                      Write-Verbose "Check if parent path exists: $destPath"
                  }
              }
              finally
              {
                  if($foundParentPath -eq $true)
                  {
                      Remove-PSDrive -Name WFCPSDrive
                  }
              }
          }
      }

      $isFileCopy = Test-Path -Path  ${{ inputs.Source }} -PathType Leaf
      $sourceDirectory = "${{ inputs.Source }}"
      $filesToCopy = ""
      if($isFileCopy){
          $sourceDirectory = Split-Path ${{ inputs.Source }}
          $filesToCopy = Split-Path ${{ inputs.Source }} -Leaf
      }


      $secureAdminPassword = ConvertTo-SecureString ${{ inputs.Password }} -AsPlainText -Force
      $machineCredential = New-Object -TypeName System.Management.Automation.PSCredential -ArgumentList ${{ inputs.ADMIN_LOGIN }}, $secureAdminPassword
      $machineShare = Get-MachineShare -fqdn ${{ inputs.Machines }} -targetPath ${{ inputs.Destination_Folder }}    
      $destinationNetworkPath = Get-DestinationNetworkPath -targetPath ${{ inputs.Destination_Folder }} -machineShare $machineShare
      
      Create-DestinationDirectory -path $destinationNetworkPath
      
      Write-Host "New-PSDrive -Name "WFCPSDrive" -PSProvider FileSystem -Root $destinationNetworkPath  -credential $machineCredential"
      New-PSDrive -Name "WFCPSDrive" -PSProvider FileSystem -Root $destinationNetworkPath  -credential $machineCredential
      robocopy "$sourceDirectory" "$destinationNetworkPath" $filesToCopy ; if ($lastexitcode -lt 8) { $global:LASTEXITCODE = $null }
      Remove-PSDrive -Name 'WFCPSDrive' -Force

